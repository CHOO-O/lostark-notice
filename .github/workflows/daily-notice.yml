name: daily-notice

on:
  schedule:
    # 10:30 KST is 01:30 UTC. Wednesday is excluded and handled by workflow_run.
    - cron: "30 1 * * 0,1,2,4,5,6"
  workflow_dispatch:
  workflow_run:
    workflows: ["get-weekly-calendar"]
    types:
      - completed

permissions:
  contents: read

jobs:
  send-notice:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Send daily Discord notice
        run: npm run notify:daily
        env:
          DISCORD_WEBHOOK_TEST: ${{ secrets.DISCORD_WEBHOOK_TEST }}
          DISCORD_WEBHOOK_MAIN: ${{ secrets.DISCORD_WEBHOOK_MAIN }}
          DISCORD_WEBHOOK_CAFE: ${{ secrets.DISCORD_WEBHOOK_CAFE }}
          DISCORD_WEBHOOK_EXTRA: ${{ secrets.DISCORD_WEBHOOK_EXTRA }}
