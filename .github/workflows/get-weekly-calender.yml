name: get-weekly-calendar

on:
  schedule:
    # 10:00 KST Wednesday is 01:00 UTC Wednesday.
    - cron: "0 1 * * 3"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Sync calendar data
        run: npm run sync:calendar
        env:
          LOSTARK_API_KEY: ${{ secrets.LOSTARK_API_KEY }}

      - name: Commit calendar data
        run: |
          if [[ -z "$(git status --porcelain data/calendar)" ]]; then
            echo "No calendar data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/calendar
          git commit -m "chore(calendar): sync weekly calendar data"
          git push
